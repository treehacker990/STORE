<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DEVIL LIB ENCRYPTOR</title>

<style>
body{
background:#0f0f0f;
color:white;
font-family:Arial;
text-align:center;
padding:40px;
}

input,button{
padding:10px;
margin:10px;
border-radius:8px;
border:none;
}

button{
background:#ff0033;
color:white;
font-weight:bold;
cursor:pointer;
}
</style>

</head>

<body>

<h2>DEVIL LIB ENCRYPTION TOOL 🔐</h2>

<input type="file" id="fileInput"><br>
<input type="text" id="key" placeholder="Enter Secret Key"><br>

<button onclick="encryptLib()">Encrypt LIB</button>

<script>

function xorEncrypt(data,key){
let result=new Uint8Array(data.length);

for(let i=0;i<data.length;i++){
result[i]=data[i]^key.charCodeAt(i%key.length)^(i*17);
}

return result;
}

function encryptLib(){

let file=document.getElementById("fileInput").files[0];
let key=document.getElementById("key").value;

if(!file){
alert("Upload lib file first");
return;
}

if(key.length<3){
alert("Enter strong key");
return;
}

let reader=new FileReader();

reader.onload=function(e){

let data=new Uint8Array(e.target.result);

let encrypted=xorEncrypt(data,key);

let blob=new Blob([encrypted]);

let a=document.createElement("a");
a.href=URL.createObjectURL(blob);

a.download="devil_encrypted_lib.so";

a.click();

};

reader.readAsArrayBuffer(file);

}

</script>

</body>
</html>
