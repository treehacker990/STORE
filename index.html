<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DEVIL APK ENCRYPT TOOL</title>
<style>
body{
background:#0f0f0f;
color:white;
font-family:Arial;
text-align:center;
padding:40px;
}
input,button{
margin:10px;
padding:10px;
border-radius:8px;
border:none;
}
button{
background:#ff0033;
color:white;
font-weight:bold;
cursor:pointer;
}
</style>
</head>

<body>

<h2>DEVIL APK ENCRYPT TOOL 🔐</h2>

<input type="file" id="fileInput"><br>
<input type="text" id="key" placeholder="Secret Key"><br>

<button onclick="encryptFile()">Encrypt APK</button>
<button onclick="decryptFile()">Decrypt APK</button>

<script>

function xor(data,key){
let result=new Uint8Array(data.length);
for(let i=0;i<data.length;i++){
result[i]=data[i]^key.charCodeAt(i%key.length)^(i*31);
}
return result;
}

function encryptFile(){
let file=document.getElementById("fileInput").files[0];
let key=document.getElementById("key").value;

let reader=new FileReader();

reader.onload=function(e){

let data=new Uint8Array(e.target.result);
let enc=xor(data,key);

let blob=new Blob([enc]);
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="devil_encrypted.apk";
a.click();

};

reader.readAsArrayBuffer(file);
}

function decryptFile(){
let file=document.getElementById("fileInput").files[0];
let key=document.getElementById("key").value;

let reader=new FileReader();

reader.onload=function(e){

let data=new Uint8Array(e.target.result);
let dec=xor(data,key);

let blob=new Blob([dec]);
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="devil_decrypted.apk";
a.click();

};

reader.readAsArrayBuffer(file);
}

</script>

</body>
</html>
