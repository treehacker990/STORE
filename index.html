<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DEVIL LIB & DEX ENCRYPTOR</title>

<style>
body{
background:#0f0f0f;
color:white;
font-family:Arial;
text-align:center;
padding:40px;
}

input,button{
padding:10px;
margin:10px;
border-radius:8px;
border:none;
width:220px;
}

button{
background:#ff0033;
color:white;
font-weight:bold;
cursor:pointer;
}

h2{
color:#ff0033;
}
</style>

</head>

<body>

<h2>DEVIL LIB / CLASSES.DEX ENCRYPTOR 🔐</h2>

<input type="file" id="fileInput"><br>

<input type="text" id="key" placeholder="Enter Secret Key"><br>

<button onclick="encryptFile()">Encrypt File</button>
<button onclick="decryptFile()">Decrypt File</button>

<script>

function processData(data,key){

let result=new Uint8Array(data.length);

for(let i=0;i<data.length;i++){

result[i]=data[i]^key.charCodeAt(i%key.length)^(i*41);

}

return result;

}

function encryptFile(){

let file=document.getElementById("fileInput").files[0];
let key=document.getElementById("key").value;

if(!file){
alert("Upload LIB or classes.dex file");
return;
}

if(key.length<6){
alert("Key must be at least 6 characters");
return;
}

let reader=new FileReader();

reader.onload=function(e){

let data=new Uint8Array(e.target.result);

let encrypted=processData(data,key);

let blob=new Blob([encrypted]);

let a=document.createElement("a");

a.href=URL.createObjectURL(blob);

a.download="devil_encrypted_"+file.name;

a.click();

};

reader.readAsArrayBuffer(file);

}

function decryptFile(){

let file=document.getElementById("fileInput").files[0];
let key=document.getElementById("key").value;

if(!file){
alert("Upload encrypted file");
return;
}

let reader=new FileReader();

reader.onload=function(e){

let data=new Uint8Array(e.target.result);

let decrypted=processData(data,key);

let blob=new Blob([decrypted]);

let a=document.createElement("a");

a.href=URL.createObjectURL(blob);

a.download="devil_decrypted_"+file.name;

a.click();

};

reader.readAsArrayBuffer(file);

}

</script>

</body>
</html>
