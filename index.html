<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DEVIL ADVANCED LIB ENCRYPTOR</title>

<style>
body{
background:#0f0f0f;
color:white;
font-family:Arial;
text-align:center;
padding:40px;
}

input,button{
padding:10px;
margin:10px;
border-radius:8px;
border:none;
width:220px;
}

button{
background:#ff0033;
color:white;
font-weight:bold;
cursor:pointer;
}

h2{
color:#ff0033;
}
</style>

</head>

<body>

<h2>DEVIL ADVANCED LIB ENCRYPTOR 🔐</h2>

<input type="file" id="fileInput"><br>

<input type="text" id="key" placeholder="Secret Key">

<button onclick="generateKey()">Generate Key</button>

<br>

<button onclick="encryptLib()">Encrypt LIB</button>
<button onclick="decryptLib()">Decrypt LIB</button>

<script>

function generateKey(){

let chars="ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";

let key="";

for(let i=0;i<24;i++){

key+=chars.charAt(Math.floor(Math.random()*chars.length));

}

document.getElementById("key").value=key;

}

function xorProcess(data,key){

let result=new Uint8Array(data.length);

for(let i=0;i<data.length;i++){

result[i]=data[i]^key.charCodeAt(i%key.length)^(i*37);

}

return result;

}

function encryptLib(){

let file=document.getElementById("fileInput").files[0];

let key=document.getElementById("key").value;

if(!file){
alert("Upload LIB file first");
return;
}

if(key.length<8){
alert("Key must be at least 8 characters");
return;
}

let reader=new FileReader();

reader.onload=function(e){

let data=new Uint8Array(e.target.result);

let encrypted=xorProcess(data,key);

let blob=new Blob([encrypted]);

let a=document.createElement("a");

a.href=URL.createObjectURL(blob);

a.download="devil_encrypted_lib.so";

a.click();

};

reader.readAsArrayBuffer(file);

}

function decryptLib(){

let file=document.getElementById("fileInput").files[0];

let key=document.getElementById("key").value;

if(!file){
alert("Upload encrypted LIB");
return;
}

let reader=new FileReader();

reader.onload=function(e){

let data=new Uint8Array(e.target.result);

let decrypted=xorProcess(data,key);

let blob=new Blob([decrypted]);

let a=document.createElement("a");

a.href=URL.createObjectURL(blob);

a.download="devil_decrypted_lib.so";

a.click();

};

reader.readAsArrayBuffer(file);

}

</script>

</body>
</html>
